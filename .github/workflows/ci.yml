name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEPLOY_TARGET: local
      DATABASE_URL: "file:./dev.db"
      APP_ENCRYPTION_KEY: "1bz04CA9k5MQ8w9aZmFYlsPFt6dz/CgK8AaQQF+jYJk="
      AUTH_MODE: none
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm db:generate
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
