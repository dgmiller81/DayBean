name: codeql

# CodeQL upload requires GitHub Advanced Security for private repos. While
# the repo is private without GHAS, the workflow runs as advisory only —
# it analyzes the code but the SARIF upload step is allowed to fail without
# blocking the PR. Once the repo is public OR GHAS is enabled, remove the
# `continue-on-error: true` and re-add this job to the required branch
# protection contexts.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"   # weekly Monday 07:00 UTC

jobs:
  analyze:
    name: analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        continue-on-error: true
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v4
        continue-on-error: true
